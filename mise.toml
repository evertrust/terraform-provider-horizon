[tools]
go = "latest"

[tasks.build]
description = "Build the provider binary"
run = "go build -o bin/terraform-provider-horizon ."

[tasks.test]
description = "Run unit tests"
run = "go test ./..."

[tasks.test-report]
description = "Run unit tests and produce JUnit + HTML reports under tests/reports/"
run = '''
set -e
mkdir -p tests/reports

if ! command -v gotestsum >/dev/null 2>&1; then
  echo "installing gotestsum"
  go install gotest.tools/gotestsum@latest
fi

gotestsum --format=standard-verbose \
  --junitfile=tests/reports/go-unit.xml \
  --jsonfile=tests/reports/go-unit.json \
  -- -timeout 5m ./internal/...
RC=$?

if command -v go-test-report >/dev/null 2>&1; then
  go list -json ./internal/... > tests/reports/go-modules-unit.json
  cat tests/reports/go-unit.json | go-test-report \
    -l tests/reports/go-modules-unit.json \
    -o tests/reports/go-unit.html \
    --title "terraform-provider-horizon-unit" || true
else
  echo "go-test-report not installed — skipping HTML render (XML+JSON still produced)"
fi

exit $RC
'''

[tasks.testacc]
description = "Run e2e acceptance tests against a live Horizon instance"
depends = ["build"]
run = """
TF_ACC=1 go test ./internal/tests/ -v -run "TestAcc" -timeout 120s
"""

[tasks.testacc.env]
HORIZON_ENDPOINT = "{{env.HORIZON_ENDPOINT}}"
HORIZON_USERNAME = "{{env.HORIZON_USERNAME}}"
HORIZON_PASSWORD = "{{env.HORIZON_PASSWORD}}"
HORIZON_PROFILE  = "{{env.HORIZON_PROFILE}}"

[env]
E2E_DOCKER_IMAGE = "terraform-provider-horizon-e2e:latest"

[tasks.docker-build-e2e]
description = "Build the e2e Docker image"
run = 'docker build -f dockerfiles/e2e.Dockerfile -t "$E2E_DOCKER_IMAGE" .'

[tasks.e2e]
description = "Run e2e tests inside Docker"
depends = ["docker-build-e2e"]
run = '''
set -e
[ -n "${LICENSE-}" ]      || { echo "ERROR: LICENSE is required"; exit 1; }
[ -n "${hrz_version-}" ]  || { echo "ERROR: hrz_version is required"; exit 1; }
[ -n "${mongo_version-}" ]|| { echo "ERROR: mongo_version is required"; exit 1; }

GOCACHE_HOST="${HOME}/.cache/go-build"
GOMOD_HOST="${GOPATH:-${HOME}/go}/pkg/mod"
mkdir -p tests/reports "$GOCACHE_HOST" "$GOMOD_HOST"

NETWORK_NAME=$(openssl rand -hex 20)
echo "creating docker network $NETWORK_NAME"
docker network create "$NETWORK_NAME" >/dev/null
trap "docker network rm $NETWORK_NAME >/dev/null 2>&1 || true" EXIT

echo "running e2e container"
docker run --rm \
    -v /var/run/docker.sock:/var/run/docker.sock \
    -v "$(pwd):/workspace" \
    -v "$GOCACHE_HOST:/root/.cache/go-build" \
    -v "$GOMOD_HOST:/go/pkg/mod" \
    -e LICENSE="$LICENSE" \
    -e DOCKER_NETWORK="$NETWORK_NAME" \
    -e MONGO_VERSION="$mongo_version" \
    -e HRZ_VERSION="$hrz_version" \
    -e PREVIEW="${preview-}" \
    -e DOCKER_AUTH_CONFIG="${DOCKER_AUTH_CONFIG-}" \
    --network "$NETWORK_NAME" \
    "$E2E_DOCKER_IMAGE" \
    bash -c 'set +e

gotestsum --format=standard-verbose \
    --junitfile=tests/reports/go-e2e.xml \
    --jsonfile=tests/reports/go-e2e.json \
    -- -tags=e2e -timeout 30m ./internal/... ./tests/e2e/...
RC=$?
go list -tags=e2e -json ./internal/... ./tests/e2e/... > tests/reports/go-modules.json

go run ./tools/tfreport -dir tests/reports >> tests/reports/go-e2e.json

cat tests/reports/go-e2e.json | go-test-report \
    -l tests/reports/go-modules.json \
    -o tests/reports/go-e2e.html \
    --title "terraform-provider-horizon-e2e" || true

chmod -R a+rw tests/reports
exit $RC'
'''